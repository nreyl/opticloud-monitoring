{% extends 'base.html' %}
{% block content %}

<div class="content">
    <div class="">
        <div class="page-header-title">
            <h4 class="page-title">Cache Statistics</h4>
        </div>
    </div>

    <br>

    <div class="page-content-wrapper">
        <div class="container">

            <div class="panel panel-default">
                <div class="panel-body">
                    <table class="table table-hover">
                        <thead>
                        <tr style="color:#0E2EB0">
                            <th>Metric</th>
                            <th>Value</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>Total Reports</td>
                            <td>{{ stats.total }}</td>
                        </tr>
                        <tr>
                            <td>Cache Hits</td>
                            <td>{{ stats.hits }}</td>
                        </tr>
                        <tr>
                            <td>Cache Misses</td>
                            <td>{{ stats.misses }}</td>
                        </tr>
                        <tr>
                            <td>Hit Rate (%)</td>
                            <td>{{ stats.hit_rate_percent }}</td>
                        </tr>
                        </tbody>
                    </table>

                    <div style="text-align:center;">
                        <button type="button" class="btn btn-primary waves-effect waves-light"
                                onClick=" window.location.href='/' ">
                            Back
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
