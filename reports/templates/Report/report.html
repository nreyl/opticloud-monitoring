{% extends 'base.html' %}
{% block content %}

<div class="content">
    <div class="">
        <div class="page-header-title">
            <h4 class="page-title">Report: {{ report.report_type }}</h4>
        </div>
    </div>

    <br>

    <div class="page-content-wrapper">
        <div class="container">

            <div class="panel panel-default">
                <div class="panel-body">
                    <table class="table table-hover">
                        <thead>
                        <tr style="color:#0E2EB0">
                            <th>Field</th>
                            <th>Value</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>Report Type</td>
                            <td>{{ report.report_type }}</td>
                        </tr>
                        <tr>
                            <td>Generated At</td>
                            <td>{{ report.generated_at }}</td>
                        </tr>
                        <tr>
                            <td>Cache Hit</td>
                            <td>{{ report.cache_hit }}</td>
                        </tr>
                        <tr>
                            <td>Generation Time (ms)</td>
                            <td>{{ report.generation_time_ms }}</td>
                        </tr>
                        </tbody>
                    </table>

                    <div style="text-align:center;">
                        <button type="button" class="btn btn-primary waves-effect waves-light"
                                onClick=" window.location.href='/' ">
                            Back
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
